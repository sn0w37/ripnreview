<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rip Review — TCG Reviews</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', sans-serif; background: #0f0f13; color: #e0e0e0; min-height: 100vh; }

  #top-bar { background: #1a1a24; border-bottom: 1px solid #2a2a3a; padding: 10px 24px; display: flex; align-items: center; justify-content: space-between; }
  #site-title img { height: 96px; width: auto; display: block; }
  #top-bar nav a { color: #aaa; text-decoration: none; margin-left: 20px; font-size: 0.9rem; transition: color .2s; cursor: pointer; }
  #top-bar nav a:hover, #top-bar nav a.active { color: #fff; }

  #brand-banner { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); border-bottom: 2px solid #a855f7; padding: 14px 24px; display: flex; flex-direction: column; align-items: flex-start; gap: 10px; }
  #banner-label { font-size: 0.7rem; font-weight: 700; letter-spacing: 2px; color: #a855f7; text-transform: uppercase; }
  #brand-pills { display: flex; flex-wrap: wrap; gap: 10px; width: 100%; }
  .brand-pill { display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 999px; padding: 6px 14px; white-space: nowrap; cursor: pointer; transition: background .2s, border-color .2s; font-size: 0.85rem; font-weight: 600; color: #ddd; user-select: none; }
  .brand-pill:hover, .brand-pill.active { background: rgba(168,85,247,0.18); border-color: #a855f7; color: #fff; }
  .brand-pill .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  #page { max-width: 1100px; margin: 0 auto; padding: 32px 20px; display: grid; grid-template-columns: 1fr 300px; gap: 32px; }
  @media(max-width:720px){ #page { grid-template-columns: 1fr; } }

  #feed-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  #feed-header h2 { font-size: 1rem; font-weight: 700; letter-spacing: 1.5px; color: #aaa; text-transform: uppercase; }
  .filter-tabs { display: flex; gap: 8px; }
  .filter-tab { background: none; border: 1px solid #2a2a3a; color: #888; border-radius: 6px; padding: 5px 12px; font-size: 0.8rem; cursor: pointer; transition: all .2s; }
  .filter-tab:hover, .filter-tab.active { background: #a855f7; border-color: #a855f7; color: #fff; }

  .post-card { background: #1a1a24; border: 1px solid #2a2a3a; border-radius: 14px; overflow: hidden; margin-bottom: 20px; transition: border-color .2s, transform .2s; }
  .post-card:hover { border-color: #a855f7; transform: translateY(-2px); }
  .card-header { display: flex; align-items: center; gap: 10px; padding: 14px 18px 10px; }
  .brand-badge { font-size: 0.7rem; font-weight: 700; letter-spacing: 1px; padding: 3px 9px; border-radius: 999px; text-transform: uppercase; }
  .tag { font-size: 0.7rem; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1); border-radius: 999px; padding: 3px 9px; color: #aaa; }
  .card-date { margin-left: auto; font-size: 0.75rem; color: #555; }
  .card-body { padding: 0 18px 16px; }
  .card-body h3 { font-size: 1.1rem; font-weight: 700; color: #f0f0f0; margin-bottom: 8px; line-height: 1.35; }
  .card-body p { font-size: 0.875rem; color: #888; line-height: 1.6; }
  .card-footer { display: flex; align-items: center; gap: 14px; padding: 12px 18px; border-top: 1px solid #23232f; }
  .rating { display: flex; gap: 3px; }
  .star { color: #f59e0b; font-size: 1rem; }
  .star.empty { color: #3a3a4a; }
  .card-footer .read-more { margin-left: auto; font-size: 0.8rem; color: #a855f7; text-decoration: none; font-weight: 600; transition: color .2s; cursor: pointer; background: none; border: none; }
  .card-footer .read-more:hover { color: #c084fc; }

  .sidebar-block { background: #1a1a24; border: 1px solid #2a2a3a; border-radius: 14px; padding: 20px; margin-bottom: 20px; }
  .sidebar-block h3 { font-size: 0.75rem; font-weight: 700; letter-spacing: 1.5px; color: #a855f7; text-transform: uppercase; margin-bottom: 14px; }
  .recent-item { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; border-bottom: 1px solid #23232f; }
  .recent-item:last-child { border-bottom: none; }
  .recent-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
  .recent-item p { font-size: 0.82rem; color: #ccc; line-height: 1.4; }
  .recent-item span { font-size: 0.72rem; color: #555; display: block; margin-top: 2px; }
  .score-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid #23232f; font-size: 0.85rem; }
  .score-row:last-child { border-bottom: none; }
  .score-row .label { color: #ccc; }
  .score-badge { font-weight: 700; padding: 2px 10px; border-radius: 999px; font-size: 0.78rem; }

  .view { display: none; }
  .view.active { display: block; }

  #article-view { max-width: 1100px; margin: 0 auto; padding: 32px 20px; background: #0f0f13; min-height: 100vh; }
  .back-btn { background: none; border: 1px solid #2a2a3a; color: #aaa; border-radius: 8px; padding: 7px 16px; cursor: pointer; font-size: 0.85rem; margin-bottom: 24px; transition: all .2s; }
  .back-btn:hover { border-color: #a855f7; color: #fff; }
  .article-card { background: #1a1a24 !important; border: 1px solid #2a2a3a; border-radius: 14px; padding: 32px; }
  .article-card .article-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; }
  .article-card h1 { font-size: 1.6rem !important; font-weight: 800; color: #f0f0f0 !important; margin-bottom: 16px; line-height: 1.3; display: block !important; visibility: visible !important; }
  .article-body { font-size: 0.95rem !important; color: #aaa !important; line-height: 1.85; display: block !important; visibility: visible !important; }
  .article-body img { max-width: 100%; border-radius: 10px; margin: 16px 0; display: block; }
  .article-rating { display: flex; gap: 4px; margin-top: 24px; padding-top: 20px; border-top: 1px solid #23232f; }

  #admin-login { max-width: 400px; margin: 80px auto; padding: 0 20px; }
  .login-card { background: #1a1a24; border: 1px solid #2a2a3a; border-radius: 14px; padding: 36px; text-align: center; }
  .login-card h2 { font-size: 1.1rem; font-weight: 700; color: #fff; margin-bottom: 8px; }
  .login-card p { font-size: 0.85rem; color: #555; margin-bottom: 24px; }
  .login-card input { width: 100%; background: #0f0f13; border: 1px solid #2a2a3a; border-radius: 8px; color: #e0e0e0; padding: 11px 14px; font-size: 0.95rem; outline: none; transition: border-color .2s; margin-bottom: 12px; text-align: center; letter-spacing: 3px; }
  .login-card input:focus { border-color: #a855f7; }
  .login-btn { width: 100%; background: #a855f7; border: none; color: #fff; border-radius: 8px; padding: 11px; font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: background .2s; }
  .login-btn:hover { background: #9333ea; }
  .login-error { color: #e84040; font-size: 0.82rem; margin-top: 10px; display: none; }

  #admin-view { max-width: 800px; margin: 0 auto; padding: 32px 20px; }
  .admin-card { background: #1a1a24; border: 1px solid #2a2a3a; border-radius: 14px; padding: 28px; }
  .admin-card h2 { font-size: 1.1rem; font-weight: 700; color: #fff; margin-bottom: 22px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
  .form-group label { font-size: 0.78rem; font-weight: 600; color: #a855f7; letter-spacing: 1px; text-transform: uppercase; }
  .form-group input, .form-group select, .form-group textarea { background: #0f0f13; border: 1px solid #2a2a3a; border-radius: 8px; color: #e0e0e0; padding: 10px 14px; font-size: 0.9rem; font-family: inherit; transition: border-color .2s; outline: none; }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: #a855f7; }
  .form-group textarea { min-height: 200px; resize: vertical; line-height: 1.6; }
  .form-group select option { background: #1a1a24; }
  .star-selector { display: flex; gap: 6px; }
  .star-btn { background: none; border: none; font-size: 1.4rem; cursor: pointer; color: #3a3a4a; transition: color .2s; }
  .star-btn.selected { color: #f59e0b; }
  .submit-btn { background: #a855f7; border: none; color: #fff; border-radius: 8px; padding: 11px 28px; font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: background .2s; margin-top: 6px; }
  .submit-btn:hover { background: #9333ea; }
  .success-msg { background: rgba(39,174,96,0.15); border: 1px solid #27ae60; color: #27ae60; border-radius: 8px; padding: 12px 16px; font-size: 0.88rem; margin-bottom: 18px; display: none; }
  .admin-posts { margin-top: 28px; }
  .admin-posts h3 { font-size: 0.75rem; font-weight: 700; letter-spacing: 1.5px; color: #a855f7; text-transform: uppercase; margin-bottom: 14px; }
  .admin-post-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #23232f; gap: 10px; }
  .admin-post-item:last-child { border-bottom: none; }
  .admin-post-item p { font-size: 0.85rem; color: #ccc; flex: 1; }
  .admin-post-item span { font-size: 0.75rem; color: #555; }
  .delete-btn { background: none; border: 1px solid #3a2a2a; color: #e84040; border-radius: 6px; padding: 3px 10px; font-size: 0.75rem; cursor: pointer; transition: all .2s; }
  .delete-btn:hover { background: #e8404022; border-color: #e84040; }
</style>
</head>
<body>

<div id="top-bar">
  <div id="site-title"><img src="ripnreview-logo.png" alt="Rip n Review"></div>
  <nav>
    <a onclick="showView('home')" id="nav-home" class="active">Home</a>
    <a onclick="showView('admin')" id="nav-admin">Admin</a>
    <a href="#">About</a>
  </nav>
</div>

<div id="brand-banner">
  <span id="banner-label">Browse by Game</span>
  <div id="brand-pills"></div>
</div>

<div id="home-view" class="view active">
  <div id="page">
    <main>
      <div id="feed-header">
        <h2>Latest Posts</h2>
        <div class="filter-tabs">
          <button class="filter-tab active" onclick="setFilter('all',this)">All</button>
          <button class="filter-tab" onclick="setFilter('review',this)">Reviews</button>
          <button class="filter-tab" onclick="setFilter('opening',this)">Openings</button>
        </div>
      </div>
      <div id="feed"></div>
    </main>
    <aside>
      <div class="sidebar-block"><h3>Recent Activity</h3><div id="recent-list"></div></div>
      <div class="sidebar-block"><h3>Top Rated Sets</h3><div id="top-rated"></div></div>
    </aside>
  </div>
</div>

<div id="article-view" class="view">
  <button class="back-btn" onclick="showView('home')">← Back to Feed</button>
  <div class="article-card">
    <div class="article-meta" id="article-meta"></div>
    <h1 id="article-title"></h1>
    <div class="article-body" id="article-body"></div>
    <div class="article-rating" id="article-rating"></div>
  </div>
</div>

<div id="admin-login" class="view">
  <div class="login-card">
    <h2>🔒 Admin Access</h2>
    <p>Enter your password to continue</p>
    <input type="password" id="admin-pw" placeholder="••••••••" onkeydown="if(event.key==='Enter')checkPassword()">
    <button class="login-btn" onclick="checkPassword()">Enter</button>
    <div class="login-error" id="login-error">Incorrect password. Try again.</div>
  </div>
</div>

<div id="admin-view" class="view">
  <div class="admin-card">
    <h2>📝 New Post</h2>
    <div id="success-msg" class="success-msg">✅ Post published successfully!</div>
    <div class="form-row">
      <div class="form-group">
        <label>Post Type</label>
        <select id="a-type"><option value="review">Review</option><option value="opening">Opening</option></select>
      </div>
      <div class="form-group">
        <label>Tag</label>
        <input id="a-tag" type="text" placeholder="e.g. Set Review, Box Opening">
      </div>
    </div>
    <div class="form-group"><label>Title</label><input id="a-title" type="text" placeholder="Post title..."></div>
    <div class="form-row">
      <div class="form-group"><label>Brand / Game</label><select id="a-brand"></select></div>
      <div class="form-group">
        <label>Rating</label>
        <div class="star-selector">
          <button class="star-btn" onclick="setRating(1)">★</button>
          <button class="star-btn" onclick="setRating(2)">★</button>
          <button class="star-btn" onclick="setRating(3)">★</button>
          <button class="star-btn" onclick="setRating(4)">★</button>
          <button class="star-btn" onclick="setRating(5)">★</button>
        </div>
      </div>
    </div>
    <div class="form-group"><label>Excerpt</label><input id="a-excerpt" type="text" placeholder="One or two sentence summary..."></div>
    <div class="form-group"><label>Full Article Body</label><textarea id="a-body" placeholder="Write your full review here..."></textarea></div>
    <button class="submit-btn" onclick="submitPost()">Publish Post</button>
    <div class="admin-posts"><h3>Manage Posts</h3><div id="admin-post-list"></div></div>
  </div>
</div>

<script>
const brands = [
  { name: "All",                  color: "#a855f7" },
  { name: "Pokémon",              color: "#ffcc00" },
  { name: "Magic: The Gathering", color: "#e05c2a" },
  { name: "One Piece",            color: "#e84040" },
  { name: "Lorcana",              color: "#4a90d9" },
  { name: "Yu-Gi-Oh!",            color: "#9b59b6" },
  { name: "Flesh & Blood",        color: "#27ae60" },
  { name: "Digimon",              color: "#2980b9" },
  { name: "Wonders of the First", color: "#2ecc71" },
];

let posts = [];
let adminRating = 0;
let activeFilter = "all";
let activeBrand = "All";
let currentView = "home";
let adminUnlocked = false;

// ── RENDER BODY (converts markdown images to HTML) ────────────────────
function renderBody(text) {
  if (!text) return '';
  return text
    .replace(/!\[.*?\]\((\/\/[^\)]+)\)/g, '<img src="https:$1" alt="image">')
    .replace(/\n/g, '<br>');
}

// ── VIEWS ─────────────────────────────────────────────────────────────
function showView(view) {
  ['home-view','article-view','admin-login','admin-view'].forEach(id => {
    document.getElementById(id).classList.remove('active');
  });
  if (view === 'admin' && !adminUnlocked) {
    document.getElementById('admin-login').classList.add('active');
    document.getElementById('nav-home').classList.remove('active');
    document.getElementById('nav-admin').classList.add('active');
    currentView = 'admin-login';
    return;
  }
  const map = { home: 'home-view', article: 'article-view', admin: 'admin-view' };
  document.getElementById(map[view]).classList.add('active');
  document.getElementById('nav-home').classList.toggle('active', view === 'home' || view === 'article');
  document.getElementById('nav-admin').classList.toggle('active', view === 'admin');
  currentView = view;
  if (view === 'admin') renderAdminList();
}

function checkPassword() {
  const val = document.getElementById('admin-pw').value;
  if (val === 'bighoss') {
    adminUnlocked = true;
    document.getElementById('admin-pw').value = '';
    document.getElementById('login-error').style.display = 'none';
    showView('admin');
  } else {
    document.getElementById('login-error').style.display = 'block';
    document.getElementById('admin-pw').value = '';
    document.getElementById('admin-pw').focus();
  }
}

// ── ARTICLE ───────────────────────────────────────────────────────────
function openArticle(id) {
  const p = posts.find(x => String(x.id) === String(id));
  if (!p) return;
  document.getElementById('article-meta').innerHTML = `
    <span class="brand-badge" style="background:${p.brandColor}22;color:${p.brandColor};border:1px solid ${p.brandColor}55">${p.brand}</span>
    <span class="tag">${p.tag}</span>
    <span style="font-size:0.75rem;color:#555;margin-left:auto">${p.date}</span>
  `;
  document.getElementById('article-title').textContent = p.title;
  document.getElementById('article-body').innerHTML = renderBody(p.body || p.excerpt);
  document.getElementById('article-rating').innerHTML = renderStars(p.rating);
  showView('article');
  window.scrollTo(0, 0);
}

// ── BRANDS ────────────────────────────────────────────────────────────
function renderBrands() {
  document.getElementById('brand-pills').innerHTML = brands.map((b,i) => `
    <div class="brand-pill ${activeBrand===b.name?'active':''}"
         onclick="setBrandByIndex(${i})"
         style="${activeBrand===b.name?`border-color:${b.color};background:${b.color}22`:''}">
      <span class="dot" style="background:${b.color}"></span>${b.name}
    </div>`).join('');
  const sel = document.getElementById('a-brand');
  if (sel) sel.innerHTML = brands.filter(b=>b.name!=='All').map(b=>`<option value="${b.name}">${b.name}</option>`).join('');
}

// ── FEED ──────────────────────────────────────────────────────────────
function renderFeed() {
  const feed = document.getElementById('feed');
  const filtered = posts.filter(p =>
    (activeFilter==='all' || p.type===activeFilter) &&
    (activeBrand==='All' || p.brand===activeBrand)
  );
  if (!filtered.length) { feed.innerHTML = `<div style="text-align:center;padding:48px;color:#555">No posts found.</div>`; return; }
  feed.innerHTML = filtered.map(p => `
    <div class="post-card">
      <div class="card-header">
        <span class="brand-badge" style="background:${p.brandColor}22;color:${p.brandColor};border:1px solid ${p.brandColor}55">${p.brand}</span>
        <span class="tag">${p.tag}</span>
        <span class="card-date">${p.date}</span>
      </div>
      <div class="card-body">
        <h3>${p.title}</h3>
        <p>${p.excerpt}</p>
      </div>
      <div class="card-footer">
        <div class="rating">${renderStars(p.rating)}</div>
        <button class="read-more" onclick="openArticle('${p.id.replace(/'/g,"\\'")}')">Read more →</button>
      </div>
    </div>`).join('');
}

// ── SIDEBAR ───────────────────────────────────────────────────────────
function renderSidebar() {
  document.getElementById('recent-list').innerHTML = [...posts].reverse().slice(0,4).map(p=>`
    <div class="recent-item">
      <div class="recent-dot" style="background:${p.brandColor}"></div>
      <div><p>${p.title}</p><span>${p.date} · ${p.brand}</span></div>
    </div>`).join('');
  const top = [...posts].sort((a,b)=>b.rating-a.rating).slice(0,4);
  document.getElementById('top-rated').innerHTML = top.map(t=>`
    <div class="score-row">
      <span class="label">${t.brand} — ${t.title.split('—')[0].trim()}</span>
      <span class="score-badge" style="background:${t.brandColor}22;color:${t.brandColor};border:1px solid ${t.brandColor}44">${'★'.repeat(t.rating)}</span>
    </div>`).join('');
}

// ── ADMIN ─────────────────────────────────────────────────────────────
function setRating(n) {
  adminRating = n;
  document.querySelectorAll('.star-btn').forEach((b,i) => b.classList.toggle('selected', i < n));
}

function submitPost() {
  const title = document.getElementById('a-title').value.trim();
  const excerpt = document.getElementById('a-excerpt').value.trim();
  const body = document.getElementById('a-body').value.trim();
  const type = document.getElementById('a-type').value;
  const tag = document.getElementById('a-tag').value.trim() || (type==='review'?'Set Review':'Box Opening');
  const brandName = document.getElementById('a-brand').value;
  const brand = brands.find(b=>b.name===brandName);
  if (!title || !excerpt || !body) { alert('Please fill in title, excerpt, and body.'); return; }
  if (!adminRating) { alert('Please select a star rating.'); return; }
  const dateStr = new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  posts.unshift({ id: Date.now(), type, brand: brand.name, brandColor: brand.color, title, excerpt, body, rating: adminRating, date: dateStr, tag });
  ['a-title','a-excerpt','a-body','a-tag'].forEach(id => document.getElementById(id).value='');
  setRating(0);
  document.getElementById('success-msg').style.display = 'block';
  setTimeout(()=>document.getElementById('success-msg').style.display='none', 3000);
  renderFeed(); renderSidebar(); renderAdminList();
}

function deletePost(id) {
  if (!confirm('Delete this post?')) return;
  posts = posts.filter(p=>String(p.id)!==String(id));
  renderFeed(); renderSidebar(); renderAdminList();
}

function renderAdminList() {
  const el = document.getElementById('admin-post-list');
  if (!posts.length) { el.innerHTML = '<p style="color:#555;font-size:0.85rem">No posts yet.</p>'; return; }
  el.innerHTML = [...posts].map(p=>`
    <div class="admin-post-item">
      <p>${p.title}</p>
      <span>${p.date}</span>
      <button class="delete-btn" onclick="deletePost('${p.id}')">Delete</button>
    </div>`).join('');
}

// ── HELPERS ───────────────────────────────────────────────────────────
function renderStars(n) {
  return Array.from({length:5},(_,i)=>`<span class="star ${i<n?'':'empty'}">★</span>`).join('');
}
function setFilter(f,el) {
  activeFilter = f;
  document.querySelectorAll('.filter-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active'); renderFeed();
}
function setBrandByIndex(i) { setBrand(brands[i].name); }
function setBrand(name) { activeBrand=name; renderBrands(); renderFeed(); }

// ── CONTENTFUL ────────────────────────────────────────────────────────
function renderRichText(doc) {
  if (!doc || !doc.content) return '';
  return doc.content.map(node => {
    if (node.nodeType === 'paragraph') return node.content.map(n=>n.value||'').join('') + '\n\n';
    if (node.nodeType === 'heading-1') return '# ' + node.content.map(n=>n.value||'').join('') + '\n\n';
    if (node.nodeType === 'heading-2') return '## ' + node.content.map(n=>n.value||'').join('') + '\n\n';
    if (node.nodeType === 'heading-3') return '### ' + node.content.map(n=>n.value||'').join('') + '\n\n';
    if (node.nodeType === 'unordered-list') return node.content.map(li=>'• '+li.content.map(p=>p.content.map(n=>n.value||'').join('')).join('')).join('\n')+'\n\n';
    if (node.nodeType === 'ordered-list') return node.content.map((li,i)=>`${i+1}. `+li.content.map(p=>p.content.map(n=>n.value||'').join('')).join('')).join('\n')+'\n\n';
    return '';
  }).join('').trim();
}

const CF_SPACE = 'v7m1m909hpus';
const CF_TOKEN = '4GX0xOdJYBvcgNTbfTnYmVGvy8LORxpfifKu3Z9qElI';
const CF_URL   = `https://cdn.contentful.com/spaces/${CF_SPACE}/entries?content_type=reviewPost&order=-fields.date&access_token=${CF_TOKEN}`;

async function fetchContentfulPosts() {
  try {
    const res  = await fetch(CF_URL);
    const data = await res.json();
    if (!data.items || !data.items.length) return;
    const fetched = data.items.map(item => {
      const f = item.fields;
      const brand = brands.find(b => b.name === f.brand) || { color: '#a855f7' };
      const brandColor = (f.brandColor && f.brandColor.startsWith('#')) ? f.brandColor : brand.color;
      return {
        id:         item.sys.id,
        type:       f.type    || 'review',
        brand:      f.brand   || 'Unknown',
        brandColor,
        title:      f.title   || '',
        excerpt:    f.excerpt || '',
        body:       typeof f.body === 'object' ? renderRichText(f.body) : (f.body || ''),
        rating:     f.rating  || 0,
        date:       f.date ? new Date(f.date).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '',
        tag:        f.tag     || 'Post',
      };
    });
    const localOnly = posts.filter(p => typeof p.id === 'number');
    posts = [...fetched, ...localOnly];
    renderFeed(); renderSidebar(); renderAdminList();
  } catch(e) {
    console.warn('Contentful fetch failed:', e);
  }
}

// ── INIT ──────────────────────────────────────────────────────────────
renderBrands(); renderFeed(); renderSidebar();
fetchContentfulPosts();
</script>
